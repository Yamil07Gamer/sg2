<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Courtois Productions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
	<script src="script.js"></script>
    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <span class="logo-text">LOGO</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="login-box">
            <form id="loginForm">
                <!-- Usuario -->
                <div class="form-group">
                    <label for="usuario" class="form-label">Usuario:</label>
                    <input 
                        type="text" 
                        id="usuario" 
                        name="usuario"
                        placeholder="PEREZ123"
                        class="form-input"
                    />
                </div>

                <!-- Contraseña -->
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña:</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password"
                        placeholder="0123456789"
                        class="form-input"
                    />
                </div>

                <!-- Button -->
                <div class="button-container">
                    <button type="submit" class="login-button">Log In</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">
            Información legal de la página web. Courtois Productions 2026 Todos los derechos reservados.
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
