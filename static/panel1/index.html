<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Courtois Productions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <span class="logo-text">SG²</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="panel-container">
            <!-- Grid de botones -->
            <div class="button-grid">
                <!-- Fila 1 -->
                <button class="panel-button finanzas" id="btnFinanzas">
                    FINANZAS
                </button>
                <button class="panel-button pedir-orden" id="btnPedirOrden">
                    PEDIR ORDEN
                </button>

                <!-- Fila 2 -->
                <button class="panel-button empleados" id="btnEmpleados">
                    EMPLEADOS
                </button>
                <button class="panel-button platillos" id="btnPlatillos">
                    PLATILLOS
                </button>

                <!-- Fila 3 -->
                <button class="panel-button inventario" id="btnInventario">
                    INVENTARIO
                </button>
                <button class="logout-button" id="btnLogout">
                    LOG OUT
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">
            Información legal de la página web. Courtois Productions 2026 Todos los derechos reservados.
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
