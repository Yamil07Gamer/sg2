<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedir Orden - SG²</title>
    <link rel="stylesheet" href="pedir-orden.css">
</head>
<body>
    <header class="header"><div class="logo">SG²</div></header>
    <main class="main-content">
        <div class="left-column">
            <div id="platillos-grid" class="platillos-grid"></div>
        </div>
        <div class="right-column">
            <div id="orden-lista" class="orden-lista"></div>
            <div id="total-display" class="total-display">TOTAL: $0.00</div>
            <div class="action-buttons">
                <button class="btn btn-cancel" id="btn-cancelar">CANCELAR</button>
                <button class="btn btn-pay" id="btn-pagar">PAGAR</button>
            </div>
        </div>
    </main>

    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h2 class="modal-title">CONFIRMAR ORDEN</h2>
            <div class="modal-field">
                <label>Nombre del cliente:</label>
                <input type="text" id="input-cliente" placeholder="Nombre">
            </div>
            <div class="modal-field">
                <label>Tipo de orden:</label>
                <select id="input-tipoorden">
                    <option value="local">Local</option>
                    <option value="llevar">Para llevar</option>
                </select>
            </div>
            <div class="modal-field">
                <label>Metodo de pago:</label>
                <select id="input-tipopago">
                    <option value="efectivo">Efectivo</option>
                    <option value="tarjeta">Tarjeta</option>
                </select>
            </div>
            <div class="modal-field">
                <label>Total recibido:</label>
                <input type="number" id="modal-total" placeholder="0.00">
            </div>
            <div class="modal-field">
                <label>Cambio:</label>
                <input type="text" id="input-cambio" readonly value="0.00">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="btn-cerrar-modal">CANCELAR</button>
                <button class="btn btn-pay" id="btn-confirmar-pago">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        Courtois Productions 2026 Todos los derechos reservados.
        <button onclick="history.back()" style="position:absolute;bottom:50%;transform:translateY(50%);left:12px;background:#ff0000;border:3px solid black;font-size:18px;font-weight:bold;width:40px;height:40px;cursor:pointer;">&lt;</button>
    </footer>
    <script src="pedir-orden.js"></script>
</body>
</html>
